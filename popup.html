<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:300px; font-family:'Noto Sans SC',sans-serif; background:#F5F0E8; color:#1A1209; }

    .header {
      background:#2C2416; color:#E8D5B0;
      padding:16px; display:flex; align-items:center; gap:10px;
    }
    .header-icon {
      width:36px; height:36px;
      background:linear-gradient(135deg,#C4813A,#8B5A1E);
      border-radius:9px; display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0;
    }
    .header h1 { font-family:'Noto Serif SC',serif; font-size:15px; font-weight:700; color:#F0DEB0; }
    .header p  { font-size:11px; color:#7A6A4A; margin-top:2px; }

    .section { padding:16px; border-bottom:1px solid #E0D4B8; }
    .section-label { font-size:11px; color:#9C8060; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }

    /* 主按钮 */
    #open-btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      width:100%; padding:13px;
      background:#C4813A; color:white; border:none; border-radius:9px;
      cursor:pointer; font-size:14px; font-family:inherit; font-weight:500;
      transition:background .18s, transform .1s;
    }
    #open-btn:hover  { background:#A56A28; }
    #open-btn:active { transform:scale(.98); }
    #open-btn:disabled { background:#C4A06A; cursor:not-allowed; }

    /* 进度条 */
    #progress-wrap { display:none; margin-top:10px; }
    #progress-bar-bg {
      height:6px; background:#E0D4B8; border-radius:3px; overflow:hidden;
    }
    #progress-bar { height:100%; background:#C4813A; border-radius:3px; width:0; transition:width .2s; }
    #progress-text { font-size:11px; color:#9C8060; margin-top:5px; text-align:center; }

    /* 拖拽区 */
    #drop-zone {
      margin-top:10px; border:1.5px dashed #C4A06A; border-radius:8px;
      padding:12px; text-align:center; font-size:12px; color:#9C8060;
      cursor:pointer; transition:all .2s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color:#C4813A; background:rgba(196,129,58,.07); color:#7A5025;
    }

    /* 统计 */
    .stat-row { display:flex; justify-content:space-between; font-size:12px; color:#5C4A2E; padding:3px 0; }
    .stat-val  { font-weight:500; color:#C4813A; }
    .empty-stat { font-size:12px; color:#9C8060; font-style:italic; }

    /* 提示 */
    .tips { padding:12px 16px 16px; }
    .tips-label { font-size:11px; color:#9C8060; margin-bottom:8px; }
    .tip { display:flex; gap:8px; font-size:12px; color:#7A6A4A; line-height:1.55; margin-bottom:5px; }

    /* 错误消息 */
    #error-msg {
      display:none; margin-top:8px; padding:8px 10px;
      background:#FFF0F0; border:1px solid #F0C0C0; border-radius:6px;
      font-size:12px; color:#C04040; line-height:1.5;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">📖</div>
  <div>
    <h1>PDF 阅读笔记</h1>
    <p>像读实体书一样批注PDF</p>
  </div>
</div>

<div class="section">
  <div class="section-label">打开本地 PDF</div>
  <input type="file" id="file-input" accept=".pdf" style="display:none">

  <button id="open-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span id="btn-text">选择 PDF 文件…</span>
  </button>

  <!-- 读取文件时显示进度 -->
  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    <div id="progress-text">正在读取文件…</div>
  </div>

  <div id="error-msg"></div>

  <div id="drop-zone">📂 或将 PDF 文件拖拽到这里</div>
</div>

<div class="section">
  <div class="section-label">批注记录</div>
  <div id="stats">
    <div class="empty-stat">加载中…</div>
  </div>
</div>

<div class="tips">
  <div class="tips-label">使用方法</div>
  <div class="tip"><span>🖊️</span><span>选中文字 → 选颜色 → 高亮</span></div>
  <div class="tip"><span>📝</span><span>便签卡片出现在右侧，写完点保存</span></div>
  <div class="tip"><span>🔵</span><span>右上角按钮可折叠为悬浮小球</span></div>
  <div class="tip"><span>💾</span><span>笔记自动保存，下次打开自动恢复</span></div>
</div>

<script src="popup.js"></script>
</body>
</html>
